<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.socket.io; connect-src 'self' https: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
  <meta name="description" content="Twindrop — безопасная отправка файлов напрямую через WebRTC.">
  <title>Отправить файл | Twindrop</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/images/icon64.ico">
  <link rel="icon" type="image/png" sizes="100x100" href="/images/icon.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/images/pwd.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
  <script src="/app-config.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="/js/pages/send-page.js"></script>
</head>
<body class="theme-premium">
  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="bg-vignette"></div>
    <div class="bg-noise" aria-hidden="true"></div>
  </div>

  <header class="app-header" role="banner" aria-label="Навигация Twindrop">
    <div class="header-inner container">
      <h1><a class="brand" href="/">Twindrop</a></h1>
      <nav class="nav" aria-label="Основная навигация">
        <a class="nav-link" href="/">Получить</a>
        <a class="nav-link" href="/send.html">Отправить</a>
        <a class="nav-link" href="/about.html">О проекте</a>
      </nav>
    </div>
    <div class="hairline"></div>
  </header>

  <main class="app-main container" role="main">
    <div class="wrap">
      <h1 class="page-title">Отправить файл</h1>

      <section class="section glass" aria-labelledby="room-title">
        <h2 id="room-title" class="section-title">Подключение к комнате</h2>
        <div class="row join-row">
          <label class="field-group grow">
            <span class="small muted">Код комнаты</span>
            <input id="codeInput" class="input mono" maxlength="6" inputmode="numeric" placeholder="Введите 6 цифр">
          </label>
          <button id="joinBtn" class="btn gloss" disabled>Подключиться</button>
        </div>
        <div id="roomHint" class="small muted hint">Введите код комнаты, который показан у получателя.</div>
      </section>

      <section id="sendPanel" class="section glass" hidden aria-labelledby="transfer-title">
        <h2 id="transfer-title" class="section-title">Передача</h2>
        <label class="field-group">
          <span class="small muted">Ссылка на эту комнату</span>
          <input id="shareLink" class="input mono" readonly>
        </label>

        <div class="row">
          <label class="field-group grow">
            <span class="small muted">Размер чанка</span>
            <select id="chunkSize" class="input"></select>
          </label>
        </div>

        <label id="dropzone" class="dropzone" for="fileInput">
          <input type="file" id="fileInput" multiple>
          <div class="dz-visual">
            <div class="dz-icon" aria-hidden="true">⇪</div>
            <div class="dz-text">
              <div class="dz-title">Выберите файл или перетащите его сюда</div>
              <div class="dz-sub muted">Передача идёт напрямую по WebRTC.</div>
            </div>
          </div>
        </label>

        <div class="row">
          <button id="sendBtn" class="btn gloss" disabled>Отправить</button>
        </div>

        <div class="progress-wrap">
          <div class="progress" aria-label="Ход отправки файла">
            <div id="sendBar" class="bar"></div>
          </div>
          <div id="sendText" class="small muted">Ожидаем подключение получателя…</div>
        </div>
      </section>

      <div id="status" class="section notice" style="display:none" role="status" aria-live="polite"></div>
    </div>
  </main>

  <footer class="app-footer" role="contentinfo">
    <div class="container footer-inner">
      <span class="muted small">Файлы не проходят через сервер и не сохраняются.</span>
    </div>
  </footer>
</body>
</html>
